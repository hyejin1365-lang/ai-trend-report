name: Periodic Reports

on:
  schedule:
    # 매주 일요일 23:50 UTC = 월요일 08:50 KST → 주간 리포트
    - cron: '50 23 * * 0'
    # 매월 1일 00:30 UTC = KST 09:30 → 월간 리포트
    - cron: '30 0 1 * *'
    # 분기 첫날 (1/1, 4/1, 7/1, 10/1) 01:00 UTC = KST 10:00 → 분기 리포트
    - cron: '0 1 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      kind:
        description: '생성할 리포트 종류'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly
          - quarterly

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine report kind
        id: kind
        run: |
          if [ -n "${{ github.event.inputs.kind }}" ]; then
            echo "kind=${{ github.event.inputs.kind }}" >> $GITHUB_OUTPUT
          else
            # cron으로 트리거된 경우 현재 날짜로 종류 추론
            DAY=$(date -u +%-d)
            MONTH=$(date -u +%-m)
            DOW=$(date -u +%u)
            if [ "$DAY" = "1" ] && [[ "$MONTH" =~ ^(1|4|7|10)$ ]]; then
              echo "kind=quarterly" >> $GITHUB_OUTPUT
            elif [ "$DAY" = "1" ]; then
              echo "kind=monthly" >> $GITHUB_OUTPUT
            else
              echo "kind=weekly" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/reports.py ${{ steps.kind.outputs.kind }}

      - name: Rebuild static site
        run: python scripts/build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "report(${{ steps.kind.outputs.kind }}): $(date -u +%Y-%m-%d)"
          git push
