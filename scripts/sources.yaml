# AI 트렌드 수집 소스 목록
# 
# type: 'rss' = 공식 RSS 피드 (안정적), 'scrape' = HTML 스크래핑 (selector 필요)
# category: LLM | 이미지 | 영상 | 종합
#
# 새 소스 추가 시: RSS 피드가 있으면 type=rss 우선, 없으면 type=scrape.
# 스크래핑 selector가 맞지 않으면 해당 소스는 건너뛰고 다른 소스는 정상 동작함.

sources:
  # ============================================
  # LLM 카테고리 — 공식 RSS (고신뢰)
  # ============================================
  - name: OpenAI
    type: rss
    url: https://openai.com/news/rss.xml
    category: LLM

  - name: Google DeepMind
    type: rss
    url: https://deepmind.google/blog/rss.xml
    category: LLM

  - name: Microsoft AI Blog
    type: rss
    url: https://blogs.microsoft.com/ai/feed/
    category: LLM

  - name: Hugging Face Blog
    type: rss
    url: https://huggingface.co/blog/feed.xml
    category: LLM

  # ============================================
  # LLM 카테고리 — 스크래핑
  # ============================================
  - name: Anthropic News
    type: scrape
    url: https://www.anthropic.com/news
    selector: 'a[href*="/news/"]'
    category: LLM

  # ============================================
  # 이미지 카테고리
  # ============================================
  - name: Stability AI
    type: scrape
    url: https://stability.ai/news
    selector: 'article, .blog-post, a[href*="/news/"]'
    category: 이미지

  - name: Adobe Firefly
    type: scrape
    url: https://blog.adobe.com/en/topics/firefly
    selector: 'article'
    category: 이미지

  - name: Midjourney Updates
    type: scrape
    url: https://updates.midjourney.com/
    selector: 'article'
    category: 이미지

  # ============================================
  # 영상 카테고리
  # ============================================
  - name: Runway Research
    type: scrape
    url: https://runwayml.com/research
    selector: 'article, a[href*="/research/"]'
    category: 영상

  # ============================================
  # 보조 소스 — Google News (키워드 검색 RSS)
  # 공식 발표 누락 시 안전망 역할
  # ============================================
  - name: Google News - 생성형 AI
    type: rss
    url: https://news.google.com/rss/search?q=%22generative+AI%22+(%22new+model%22+OR+%22releases%22+OR+%22launches%22)&hl=ko&gl=KR&ceid=KR:ko
    category: 종합

  - name: Google News - AI 영상
    type: rss
    url: https://news.google.com/rss/search?q=(%22Sora%22+OR+%22Runway%22+OR+%22Pika%22+OR+%22Kling%22)+update&hl=ko&gl=KR&ceid=KR:ko
    category: 영상
