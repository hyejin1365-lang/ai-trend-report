# AI 트렌드 수집 소스 목록
#
# type: 'rss' = 공식 RSS 피드 (안정적), 'scrape' = HTML 스크래핑 (selector 필요)
# category: LLM | 이미지 | 영상 | 종합
#
# 날짜 필터는 collect.py의 COLLECTION_WINDOW_HOURS 값 기준.
# 기본 24시간. 스크래핑 소스는 날짜 확인 불가 시 자동 제외됨.

sources:
  # ============================================
  # LLM — 공식 RSS (고신뢰)
  # ============================================
  - name: OpenAI
    type: rss
    url: https://openai.com/news/rss.xml
    category: LLM

  - name: Google DeepMind
    type: rss
    url: https://deepmind.google/blog/rss.xml
    category: LLM

  - name: Microsoft AI Blog
    type: rss
    url: https://blogs.microsoft.com/ai/feed/
    category: LLM

  - name: Hugging Face Blog
    type: rss
    url: https://huggingface.co/blog/feed.xml
    category: LLM

  # ============================================
  # LLM — 스크래핑
  # ============================================
  - name: Anthropic News
    type: scrape
    url: https://www.anthropic.com/news
    selector: 'a[href*="/news/"]'
    category: LLM

  # ============================================
  # 이미지 — 스크래핑 (공식 RSS 희소)
  # ============================================
  - name: Stability AI
    type: scrape
    url: https://stability.ai/news
    selector: 'article, .blog-post, a[href*="/news/"]'
    category: 이미지

  - name: Adobe Firefly
    type: scrape
    url: https://blog.adobe.com/en/topics/firefly
    selector: 'article'
    category: 이미지

  - name: Midjourney Updates
    type: scrape
    url: https://updates.midjourney.com/
    selector: 'article'
    category: 이미지

  # ============================================
  # 영상 — 스크래핑 (공식 RSS 희소)
  # ============================================
  - name: Runway Research
    type: scrape
    url: https://runwayml.com/research
    selector: 'article, a[href*="/research/"]'
    category: 영상

  - name: Runway Changelog
    type: scrape
    url: https://runwayml.com/changelog
    selector: 'article, [class*="changelog"], [class*="update"]'
    category: 영상

  - name: Luma News
    type: scrape
    url: https://lumalabs.ai/news
    selector: 'article, a[href*="/news/"], a[href*="/blog/"]'
    category: 영상

  - name: WaveSpeedAI Blog
    type: scrape
    url: https://wavespeed.ai/blog
    selector: 'article, a[href*="/blog/"]'
    category: 영상

  - name: Hugging Face Papers
    type: scrape
    url: https://huggingface.co/papers
    selector: 'article, a[href*="/papers/"]'
    category: 영상

  # ============================================
  # 테크 뉴스 애그리게이터 — AI 전체 커버
  # ============================================
  - name: The Verge - AI
    type: rss
    url: https://www.theverge.com/ai-artificial-intelligence/rss/index.xml
    category: 종합

  - name: TechCrunch - AI
    type: rss
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: 종합

  - name: VentureBeat - AI
    type: rss
    url: https://venturebeat.com/category/ai/feed/
    category: 종합

  - name: MIT Technology Review - AI
    type: rss
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    category: 종합

  # ============================================
  # Reddit — 커뮤니티 기반 빠른 발견
  # 비공식이지만 신모델·기능 발표가 가장 빠르게 모이는 채널
  # ============================================
  - name: Reddit - StableDiffusion
    type: rss
    url: https://www.reddit.com/r/StableDiffusion/top/.rss?t=day
    category: 이미지

  - name: Reddit - midjourney
    type: rss
    url: https://www.reddit.com/r/midjourney/top/.rss?t=day
    category: 이미지

  - name: Reddit - aivideo
    type: rss
    url: https://www.reddit.com/r/aivideo/top/.rss?t=day
    category: 영상

  - name: Reddit - LocalLLaMA
    type: rss
    url: https://www.reddit.com/r/LocalLLaMA/top/.rss?t=day
    category: LLM

  # ============================================
  # GitHub Releases — 오픈소스 모델 정확한 출시 트래킹
  # ============================================
  - name: GitHub - ComfyUI Releases
    type: rss
    url: https://github.com/comfyanonymous/ComfyUI/releases.atom
    category: 이미지

  - name: GitHub - Stability AI generative-models
    type: rss
    url: https://github.com/Stability-AI/generative-models/releases.atom
    category: 이미지

  - name: GitHub - Black Forest FLUX
    type: rss
    url: https://github.com/black-forest-labs/flux/releases.atom
    category: 이미지

  # ============================================
  # Google News — 카테고리별 키워드 쿼리 (안전망)
  # ============================================
  - name: Google News - 영상 AI
    type: rss
    url: https://news.google.com/rss/search?q=(Sora+OR+Runway+OR+Pika+OR+Kling+OR+Veo+OR+Luma)+(update+OR+release+OR+launch+OR+feature)&hl=en&gl=US&ceid=US:en
    category: 영상

  - name: Google News - 이미지 AI
    type: rss
    url: https://news.google.com/rss/search?q=(Midjourney+OR+%22Stable+Diffusion%22+OR+%22DALL-E%22+OR+Ideogram+OR+FLUX+OR+Firefly)+(update+OR+release+OR+launch)&hl=en&gl=US&ceid=US:en
    category: 이미지

  - name: Google News - LLM
    type: rss
    url: https://news.google.com/rss/search?q=(GPT+OR+Claude+OR+Gemini+OR+Llama+OR+Qwen)+(model+OR+release+OR+update)&hl=en&gl=US&ceid=US:en
    category: LLM

  - name: Google News - Adobe AI
    type: rss
    url: https://news.google.com/rss/search?q=Adobe+(Firefly+OR+Photoshop+OR+%22After+Effects%22)+AI&hl=en&gl=US&ceid=US:en
    category: 종합
